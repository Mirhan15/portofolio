<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brick Breaker — Mirhan Maulana</title>
  <link rel="icon" type="image/png" href="../assets/images/MirhanLog.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/games.css" />
  <style>
    body { background: #05070f; overflow: hidden; }
    #mainNav { position: fixed; }

    .brick-wrap {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: 60px;
    }

    #brickCanvas {
      display: block;
      border-radius: 12px;
      border: 1px solid rgba(244,114,182,0.2);
      max-width: 100%;
      max-height: calc(100vh - 80px);
      cursor: none;
    }

    .hud {
      position: fixed;
      top: 68px;
      left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      padding: 8px 20px;
      pointer-events: none;
      z-index: 100;
    }

    .hud-stat {
      background: rgba(5,7,15,0.85);
      border: 1px solid rgba(244,114,182,0.25);
      border-radius: 8px;
      padding: 6px 14px;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: #f472b6;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .hud-stat span { color: #f0f4ff; font-weight: 700; }

    .game-overlay {
      position: fixed;
      inset: 0;
      background: rgba(5,7,15,0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 200;
      -webkit-backdrop-filter: blur(6px);
      backdrop-filter: blur(6px);
    }

    .game-overlay.hidden { display: none; }

    .ov-emoji { font-size: 4rem; line-height: 1; }
    .ov-title { font-family: var(--font-heading); font-size: 2.5rem; font-weight: 800; color: #f0f4ff; }
    .ov-sub   { font-family: var(--font-mono); font-size: 0.82rem; color: #8892a4; text-align: center; line-height: 1.7; }
    .ov-score { font-family: var(--font-heading); font-size: 1.1rem; font-weight: 700; color: #f472b6; }

    .ov-btn {
      background: linear-gradient(135deg,#db2777,#f472b6);
      border: none; color: white;
      padding: 12px 32px; border-radius: 12px;
      font-size: 0.9rem; font-weight: 700; cursor: pointer;
      transition: all 0.3s ease;
      display: flex; align-items: center; gap: 8px;
      font-family: var(--font-heading);
    }

    .ov-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(244,114,182,0.4); }

    .back-btn {
      position: fixed; bottom: 20px; left: 20px; z-index: 300;
      background: rgba(5,7,15,0.85);
      border: 1px solid rgba(255,255,255,0.1);
      color: #8892a4; padding: 8px 16px; border-radius: 8px;
      font-family: var(--font-mono); font-size: 0.72rem;
      text-decoration: none; transition: all 0.3s ease;
      display: flex; align-items: center; gap: 6px;
    }

    .back-btn:hover { color: #f472b6; border-color: rgba(244,114,182,0.3); }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg" id="mainNav">
  <div class="container">
    <a class="navbar-brand" href="../index.html"><span>&lt;</span>Mirhan Maulana<span class="accent">/&gt;</span></a>
    <div class="d-flex align-items-center gap-3">
      <div class="dark-toggle" id="darkToggle" title="Toggle theme">
        <div class="dark-toggle-thumb"><i class="fa-solid fa-moon"></i></div>
      </div>
    </div>
  </div>
</nav>

<div class="hud">
  <div class="hud-stat">⭐ Score <span id="scoreVal">0</span></div>
  <div class="hud-stat">🧱 Level <span id="levelVal">1</span></div>
  <div class="hud-stat">❤️ Lives <span id="livesVal">3</span></div>
  <div class="hud-stat">🏆 Best <span id="bestVal">0</span></div>
</div>

<div class="brick-wrap">
  <canvas id="brickCanvas"></canvas>
</div>

<div class="game-overlay" id="overlay">
  <div class="ov-emoji">🧱</div>
  <div class="ov-title">Brick Breaker</div>
  <div class="ov-sub">Pantulkan bola, hancurkan semua bata!<br>Jangan sampai bola jatuh ke bawah.</div>
  <button class="ov-btn" id="startBtn"><i class="fa-solid fa-play"></i> Start</button>
  <div class="ov-sub" style="font-size:0.72rem;color:#4a5568">
    Mouse / ← → — Gerakkan paddle &nbsp;|&nbsp; Space — Launch bola
  </div>
</div>

<a href="../games.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Games</a>

<script>
  // Dark mode
  const darkToggle = document.getElementById('darkToggle');
  const html = document.documentElement;
  html.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');
  darkToggle.addEventListener('click', () => {
    const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
  });

  const canvas = document.getElementById('brickCanvas');
  const ctx    = canvas.getContext('2d');

  function resize() {
    canvas.width  = Math.min(window.innerWidth, 480);
    canvas.height = Math.min(window.innerHeight - 80, 620);
  }
  resize();
  window.addEventListener('resize', resize);

  // ── Config ──
  const PADDLE_H  = 12;
  const PADDLE_W  = 90;
  const BALL_R    = 8;
  const BRICK_ROWS = 5;
  const BRICK_COLS = 8;
  const BRICK_PAD  = 6;
  const BRICK_TOP  = 60;

  const BRICK_COLORS = [
    { fill: '#f472b6', stroke: '#db2777', pts: 50 },
    { fill: '#fb923c', stroke: '#ea580c', pts: 40 },
    { fill: '#fbbf24', stroke: '#d97706', pts: 30 },
    { fill: '#4ade80', stroke: '#16a34a', pts: 20 },
    { fill: '#60a5fa', stroke: '#2563eb', pts: 10 },
  ];

  // ── State ──
  let paddle, ball, bricks, particles;
  let score, level, lives, running, animId, launched;
  let keys = {};
  let mouseX = -1;
  let best = parseInt(localStorage.getItem('brickBest') || '0');

  document.getElementById('bestVal').textContent = best;

  // ── Init ──
  function init() {
    const W = canvas.width, H = canvas.height;

    paddle = {
      x: W / 2 - PADDLE_W / 2,
      y: H - 40,
      w: PADDLE_W, h: PADDLE_H,
      speed: 7,
    };

    ball = {
      x: W / 2,
      y: paddle.y - BALL_R - 2,
      vx: 0, vy: 0,
      r: BALL_R,
      speed: 5 + level * 0.4,
    };

    particles = [];
    launched  = false;
    running   = true;

    buildBricks();
    overlay.classList.add('hidden');
    if (animId) cancelAnimationFrame(animId);
    lastTime = 0;
    requestAnimationFrame(loop);
  }

  function initFull() {
    score = 0; level = 1; lives = 3;
    document.getElementById('scoreVal').textContent = 0;
    document.getElementById('levelVal').textContent = 1;
    document.getElementById('livesVal').textContent = 3;
    init();
  }

  // ── Build Bricks ──
  function buildBricks() {
    bricks = [];
    const W    = canvas.width;
    const bw   = (W - BRICK_PAD * (BRICK_COLS + 1)) / BRICK_COLS;
    const bh   = 22;

    for (let r = 0; r < BRICK_ROWS; r++) {
      for (let c = 0; c < BRICK_COLS; c++) {
        const hp = level >= 3 && r < 2 ? 2 : 1;
        bricks.push({
          x: BRICK_PAD + c * (bw + BRICK_PAD),
          y: BRICK_TOP + r * (bh + BRICK_PAD),
          w: bw, h: bh,
          alive: true,
          hp, maxHp: hp,
          color: BRICK_COLORS[r],
        });
      }
    }
  }

  // ── Launch ──
  function launch() {
    if (launched) return;
    launched = true;
    const angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.8;
    ball.vx = Math.cos(angle) * ball.speed;
    ball.vy = Math.sin(angle) * ball.speed;
  }

  // ── Particles ──
  function spawnParticles(x, y, color, count = 8) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const spd   = 1 + Math.random() * 4;
      particles.push({
        x, y,
        vx: Math.cos(angle) * spd,
        vy: Math.sin(angle) * spd,
        r: 2 + Math.random() * 3,
        color, life: 1,
        decay: 0.04 + Math.random() * 0.03,
      });
    }
  }

  // ── Update ──
  function update(dt) {
    const W = canvas.width, H = canvas.height;

    // Paddle move
    if (mouseX >= 0) {
      paddle.x = mouseX - paddle.w / 2;
    } else {
      if (keys['arrowleft']  || keys['a']) paddle.x -= paddle.speed;
      if (keys['arrowright'] || keys['d']) paddle.x += paddle.speed;
    }
    paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));

    // Ball follow paddle if not launched
    if (!launched) {
      ball.x = paddle.x + paddle.w / 2;
      ball.y = paddle.y - BALL_R - 2;
      if (keys[' '] || keys['space']) launch();
      return;
    }

    // Ball move
    ball.x += ball.vx;
    ball.y += ball.vy;

    // Wall bounce
    if (ball.x - ball.r <= 0)      { ball.x = ball.r;     ball.vx = Math.abs(ball.vx); }
    if (ball.x + ball.r >= W)      { ball.x = W - ball.r; ball.vx = -Math.abs(ball.vx); }
    if (ball.y - ball.r <= 0)      { ball.y = ball.r;     ball.vy = Math.abs(ball.vy); }

    // Ball falls
    if (ball.y - ball.r > H) {
      lives--;
      document.getElementById('livesVal').textContent = lives;
      spawnParticles(ball.x, H - 20, '#ef4444', 12);
      if (lives <= 0) { gameOver(); return; }
      launched = false;
      ball.x = paddle.x + paddle.w / 2;
      ball.y = paddle.y - BALL_R - 2;
      ball.vx = 0; ball.vy = 0;
      return;
    }

    // Paddle bounce
    if (ball.y + ball.r >= paddle.y &&
        ball.y - ball.r <= paddle.y + PADDLE_H &&
        ball.x >= paddle.x - ball.r &&
        ball.x <= paddle.x + paddle.w + ball.r &&
        ball.vy > 0) {
      // Angle based on hit position
      const hitPos = (ball.x - paddle.x) / paddle.w; // 0..1
      const angle  = (hitPos - 0.5) * Math.PI * 0.7;
      const spd    = Math.hypot(ball.vx, ball.vy);
      ball.vx = Math.sin(angle) * spd;
      ball.vy = -Math.abs(Math.cos(angle) * spd);
      ball.y  = paddle.y - ball.r - 1;
      spawnParticles(ball.x, paddle.y, '#f472b6', 4);
    }

    // Brick collision
    bricks.forEach(b => {
      if (!b.alive) return;
      if (ball.x + ball.r > b.x && ball.x - ball.r < b.x + b.w &&
          ball.y + ball.r > b.y && ball.y - ball.r < b.y + b.h) {

        b.hp--;
        if (b.hp <= 0) {
          b.alive = false;
          score += b.color.pts * level;
          document.getElementById('scoreVal').textContent = score;
          spawnParticles(b.x + b.w/2, b.y + b.h/2, b.color.fill, 10);
        } else {
          spawnParticles(b.x + b.w/2, b.y + b.h/2, b.color.fill, 4);
        }

        // Reflect ball
        const overlapX = Math.min(ball.x + ball.r - b.x, b.x + b.w - (ball.x - ball.r));
        const overlapY = Math.min(ball.y + ball.r - b.y, b.y + b.h - (ball.y - ball.r));
        if (overlapX < overlapY) ball.vx *= -1;
        else ball.vy *= -1;
      }
    });

    // Check level clear
    if (bricks.every(b => !b.alive)) {
      level++;
      document.getElementById('levelVal').textContent = level;
      init();
    }

    // Particles
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      p.vx *= 0.93; p.vy *= 0.93;
      p.life -= p.decay;
    });
    particles = particles.filter(p => p.life > 0);
  }

  // ── Draw ──
  function draw() {
    const W = canvas.width, H = canvas.height;

    ctx.fillStyle = '#080d1a';
    ctx.fillRect(0, 0, W, H);

    // Grid bg
    ctx.strokeStyle = 'rgba(244,114,182,0.04)';
    ctx.lineWidth = 1;
    for (let x = 0; x < W; x += 30) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
    for (let y = 0; y < H; y += 30) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

    // Particles
    particles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });

    // Bricks
    bricks.forEach(b => {
      if (!b.alive) return;
      const alpha = b.hp < b.maxHp ? 0.5 : 1;
      ctx.save();
      ctx.globalAlpha = alpha;

      // Brick body
      ctx.fillStyle = b.color.fill;
      ctx.shadowColor = b.color.fill;
      ctx.shadowBlur  = 6;
      roundRect(ctx, b.x + 2, b.y + 2, b.w - 4, b.h - 4, 5);
      ctx.fill();

      // Shine
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      roundRect(ctx, b.x + 2, b.y + 2, b.w - 4, (b.h - 4) / 2, 5);
      ctx.fill();

      // HP crack
      if (b.hp < b.maxHp) {
        ctx.strokeStyle = 'rgba(0,0,0,0.6)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(b.x + b.w * 0.3, b.y + 4);
        ctx.lineTo(b.x + b.w * 0.5, b.y + b.h - 4);
        ctx.moveTo(b.x + b.w * 0.6, b.y + 4);
        ctx.lineTo(b.x + b.w * 0.45, b.y + b.h - 4);
        ctx.stroke();
      }

      ctx.restore();
    });

    // Paddle
    ctx.save();
    ctx.shadowColor = '#f472b6';
    ctx.shadowBlur  = 14;
    const grad = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + PADDLE_H);
    grad.addColorStop(0, '#f472b6');
    grad.addColorStop(1, '#db2777');
    ctx.fillStyle = grad;
    roundRect(ctx, paddle.x, paddle.y, paddle.w, PADDLE_H, 6);
    ctx.fill();
    ctx.restore();

    // Ball
    ctx.save();
    ctx.shadowColor = '#fbbf24';
    ctx.shadowBlur  = 16;
    const ballGrad = ctx.createRadialGradient(ball.x - 2, ball.y - 2, 1, ball.x, ball.y, ball.r);
    ballGrad.addColorStop(0, '#fff');
    ballGrad.addColorStop(1, '#fbbf24');
    ctx.fillStyle = ballGrad;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Launch hint
    if (!launched) {
      ctx.fillStyle = 'rgba(244,114,182,0.6)';
      ctx.font = '12px "Space Mono"';
      ctx.textAlign = 'center';
      ctx.fillText('Space / Click to launch', W / 2, paddle.y - 20);
    }
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  // ── Game Over ──
  function gameOver() {
    running = false;
    cancelAnimationFrame(animId);

    const isNew = score > best;
    if (isNew) { best = score; localStorage.setItem('brickBest', best); }
    document.getElementById('bestVal').textContent = best;

    overlay.classList.remove('hidden');
    overlay.innerHTML = `
      <div class="ov-emoji">💔</div>
      <div class="ov-title">Game Over!</div>
      <div class="ov-score">Score: ${score} &nbsp;|&nbsp; Level: ${level}</div>
      <div class="ov-sub">${isNew ? '🏆 New Best Score!' : `Best: ${best}`}</div>
      <button class="ov-btn" id="startBtn"><i class="fa-solid fa-rotate-right"></i> Play Again</button>
      <a href="../games.html" style="font-family:var(--font-mono);font-size:0.75rem;color:#4a5568;text-decoration:none;">← Back to Games</a>
    `;
    document.getElementById('startBtn').addEventListener('click', initFull);
  }

  // ── Loop ──
  let lastTime = 0;
  function loop(ts) {
    const dt = Math.min(ts - lastTime, 50);
    lastTime = ts;
    if (!running) return;
    update(dt);
    draw();
    animId = requestAnimationFrame(loop);
  }

  // ── Input ──
  document.addEventListener('keydown', e => {
    keys[e.key.toLowerCase()] = true;
    if ([' ','arrowleft','arrowright'].includes(e.key.toLowerCase())) e.preventDefault();
  });
  document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
  });
  canvas.addEventListener('mouseleave', () => { mouseX = -1; });
  canvas.addEventListener('click', launch);

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    mouseX = (e.touches[0].clientX - rect.left) * (canvas.width / rect.width);
  }, { passive: false });
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    launch();
    const rect = canvas.getBoundingClientRect();
    mouseX = (e.touches[0].clientX - rect.left) * (canvas.width / rect.width);
  }, { passive: false });

  document.getElementById('startBtn').addEventListener('click', initFull);
</script>
</body>
</html>
