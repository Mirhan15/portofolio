<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Card — Mirhan Maulana</title>
  <link rel="icon" type="image/png" href="../assets/images/MirhanLog.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/games.css" />
  <style>
    body { background: var(--bg-primary); }
    .mem-wrap { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 100px 16px 60px; }
    .mem-panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; width: 100%; max-width: 500px; }
    .mem-header { background: rgba(255,255,255,0.03); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
    .mem-title { font-family: var(--font-mono); font-size: 0.85rem; font-weight: 700; color: #a78bfa; }
    .mem-body { padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .mem-stats { display: flex; gap: 24px; justify-content: center; }
    .m-stat { text-align: center; }
    .m-stat-val { font-family: var(--font-heading); font-size: 1.8rem; font-weight: 800; color: var(--text-primary); line-height: 1; display: block; }
    .m-stat-lbl { font-family: var(--font-mono); font-size: 0.62rem; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; }
    .mem-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; }
    .mem-card { aspect-ratio: 1; cursor: pointer; perspective: 600px; -webkit-tap-highlight-color: transparent; }
    .mem-card-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.4s ease; border-radius: 10px; }
    .mem-card.flipped .mem-card-inner { transform: rotateY(180deg); }
    .mem-card-front, .mem-card-back { position: absolute; inset: 0; border-radius: 10px; display: flex; align-items: center; justify-content: center; backface-visibility: hidden; font-size: 1.6rem; }
    .mem-card-front { background: var(--bg-secondary); border: 1px solid var(--border); color: var(--text-muted); font-size: 1.1rem; }
    .mem-card-back { background: rgba(167,139,250,0.15); border: 1px solid rgba(167,139,250,0.4); transform: rotateY(180deg); }
    .mem-card.matched .mem-card-back { background: rgba(34,197,94,0.15); border-color: rgba(34,197,94,0.4); }
    .m-btn { background: linear-gradient(135deg,#7c3aed,#a78bfa); border: none; color: white; padding: 10px 22px; border-radius: var(--radius); font-size: 0.82rem; font-weight: 700; cursor: pointer; transition: var(--transition); display: flex; align-items: center; gap: 7px; font-family: var(--font-heading); }
    .m-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(124,58,237,0.4); }
    .diff-btns { display: flex; gap: 8px; }
    .diff-btn { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); padding: 5px 14px; border-radius: 100px; font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: var(--transition); font-family: var(--font-mono); }
    .diff-btn:hover { border-color: #a78bfa; color: #a78bfa; }
    .diff-btn.active { background: rgba(167,139,250,0.12); border-color: #a78bfa; color: #a78bfa; }
    .result-card { display: none; flex-direction: column; align-items: center; gap: 10px; padding: 20px; background: rgba(167,139,250,0.06); border: 1px solid rgba(167,139,250,0.2); border-radius: 14px; width: 100%; text-align: center; }
    .result-card.show { display: flex; }
    .result-emoji { font-size: 2.5rem; }
    .result-title { font-family: var(--font-heading); font-size: 1.4rem; font-weight: 800; color: var(--text-primary); }
    .result-detail { font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-secondary); }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg" id="mainNav">
  <div class="container">
    <a class="navbar-brand" href="../index.html"><span>&lt;</span>Mirhan Maulana<span class="accent">/&gt;</span></a>
    <div class="d-flex align-items-center gap-3">
      <div class="dark-toggle" id="darkToggle" title="Toggle theme">
        <div class="dark-toggle-thumb"><i class="fa-solid fa-moon"></i></div>
      </div>
    </div>
  </div>
</nav>

<div class="mem-wrap">
  <a href="../games.html" class="game-back-btn mb-3"><i class="fa-solid fa-arrow-left"></i> Back to Games</a>

  <div class="mem-panel">
    <div class="mem-header">
      <div class="mem-title">🧠 Memory Card</div>
      <span style="font-family:var(--font-mono);font-size:0.65rem;color:var(--text-muted)" id="diffLabel">4×4 · Normal</span>
    </div>
    <div class="mem-body">
      <div class="mem-stats">
        <div class="m-stat"><span class="m-stat-val" id="movesVal">0</span><span class="m-stat-lbl">Moves</span></div>
        <div class="m-stat"><span class="m-stat-val" id="pairsVal">0</span><span class="m-stat-lbl">Pairs</span></div>
        <div class="m-stat"><span class="m-stat-val" id="timeVal">0</span><span class="m-stat-lbl">Seconds</span></div>
        <div class="m-stat"><span class="m-stat-val" id="bestVal">—</span><span class="m-stat-lbl">Best</span></div>
      </div>

      <div class="diff-btns">
        <button class="diff-btn active" data-size="4">4×4</button>
        <button class="diff-btn" data-size="5">5×4</button>
        <button class="diff-btn" data-size="6">6×4</button>
      </div>

      <div class="mem-grid" id="memGrid"></div>

      <div class="result-card" id="resultCard">
        <div class="result-emoji">🎉</div>
        <div class="result-title" id="resultTitle">Selesai!</div>
        <div class="result-detail" id="resultDetail"></div>
      </div>

      <button class="m-btn" id="startBtn"><i class="fa-solid fa-rotate-right"></i> New Game</button>
    </div>
  </div>
</div>

<script>
  const darkToggle = document.getElementById('darkToggle');
  const html = document.documentElement;
  html.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');
  darkToggle.addEventListener('click', () => {
    const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next); localStorage.setItem('theme', next);
  });

  const EMOJIS = ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🐵','🦄','🐙','🦋','🌸','🍕','🎮','🚀','⭐','🎯'];

  let cols, rows, totalPairs;
  let flipped = [], matched = 0, moves = 0, lockBoard = false;
  let timerInterval, seconds = 0, started = false;
  let bestTimes = {};

  try { bestTimes = JSON.parse(localStorage.getItem('memBest') || '{}'); } catch(e) {}

  let currentSize = 4;

  function init() {
    clearInterval(timerInterval);
    cols = currentSize; rows = 4;
    totalPairs = (cols * rows) / 2;
    flipped = []; matched = 0; moves = 0; seconds = 0; started = false; lockBoard = false;

    document.getElementById('movesVal').textContent = 0;
    document.getElementById('pairsVal').textContent = 0;
    document.getElementById('timeVal').textContent = 0;
    document.getElementById('resultCard').classList.remove('show');

    const key = `${cols}x${rows}`;
    const b = bestTimes[key];
    document.getElementById('bestVal').textContent = b ? b + 's' : '—';
    document.getElementById('diffLabel').textContent = `${cols}×${rows}`;

    const grid = document.getElementById('memGrid');
    grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

    const pool = EMOJIS.slice(0, totalPairs);
    const cards = [...pool, ...pool].sort(() => Math.random() - 0.5);

    grid.innerHTML = '';
    cards.forEach((emoji, i) => {
      const card = document.createElement('div');
      card.className = 'mem-card';
      card.dataset.emoji = emoji;
      card.innerHTML = `
        <div class="mem-card-inner">
          <div class="mem-card-front"><i class="fa-solid fa-question"></i></div>
          <div class="mem-card-back">${emoji}</div>
        </div>`;
      card.addEventListener('click', () => flipCard(card));
      grid.appendChild(card);
    });
  }

  function flipCard(card) {
    if (lockBoard || card.classList.contains('flipped') || card.classList.contains('matched')) return;

    if (!started) {
      started = true;
      timerInterval = setInterval(() => {
        seconds++;
        document.getElementById('timeVal').textContent = seconds;
      }, 1000);
    }

    card.classList.add('flipped');
    flipped.push(card);

    if (flipped.length === 2) {
      lockBoard = true;
      moves++;
      document.getElementById('movesVal').textContent = moves;

      if (flipped[0].dataset.emoji === flipped[1].dataset.emoji) {
        flipped.forEach(c => c.classList.add('matched'));
        matched++;
        document.getElementById('pairsVal').textContent = matched;
        flipped = []; lockBoard = false;

        if (matched === totalPairs) {
          clearInterval(timerInterval);
          const key = `${cols}x${rows}`;
          const prev = bestTimes[key];
          const isNew = !prev || seconds < prev;
          if (isNew) { bestTimes[key] = seconds; localStorage.setItem('memBest', JSON.stringify(bestTimes)); }
          document.getElementById('bestVal').textContent = bestTimes[key] + 's';

          const rc = document.getElementById('resultCard');
          document.getElementById('resultTitle').textContent = isNew ? '🏆 New Best!' : '🎉 Selesai!';
          document.getElementById('resultDetail').textContent = `${moves} moves · ${seconds} detik${isNew ? ' · New Record!' : ''}`;
          rc.classList.add('show');
        }
      } else {
        setTimeout(() => {
          flipped.forEach(c => c.classList.remove('flipped'));
          flipped = []; lockBoard = false;
        }, 900);
      }
    }
  }

  document.querySelectorAll('.diff-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentSize = parseInt(btn.dataset.size);
      init();
    });
  });

  document.getElementById('startBtn').addEventListener('click', init);
  init();
</script>
</body>
</html>
