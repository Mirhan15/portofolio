<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ping Pong — Mirhan Maulana</title>
  <link rel="icon" type="image/png" href="../assets/images/MirhanLog.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/games.css" />
  <style>
    body { background: #05070f; overflow: hidden; }
    #mainNav { position: fixed; }

    .pp-wrap {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: 60px;
    }

    #ppCanvas {
      display: block;
      border-radius: 12px;
      border: 1px solid rgba(232,121,249,0.2);
      max-width: 100%;
      max-height: calc(100vh - 80px);
    }

    .game-overlay {
      position: fixed; inset: 0;
      background: rgba(5,7,15,0.92);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; z-index: 200;
      -webkit-backdrop-filter: blur(6px);
      backdrop-filter: blur(6px);
    }
    .game-overlay.hidden { display: none; }
    .ov-emoji { font-size: 4rem; line-height: 1; }
    .ov-title { font-family: var(--font-heading); font-size: 2.5rem; font-weight: 800; color: #f0f4ff; }
    .ov-sub   { font-family: var(--font-mono); font-size: 0.82rem; color: #8892a4; text-align: center; line-height: 1.7; }
    .ov-score { font-family: var(--font-heading); font-size: 1.2rem; font-weight: 700; color: #e879f9; }
    .ov-btn {
      background: linear-gradient(135deg,#a21caf,#e879f9);
      border: none; color: white; padding: 12px 32px; border-radius: 12px;
      font-size: 0.9rem; font-weight: 700; cursor: pointer;
      transition: all 0.3s ease; display: flex; align-items: center; gap: 8px;
      font-family: var(--font-heading);
    }
    .ov-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(232,121,249,0.4); }

    .diff-row { display: flex; gap: 10px; }
    .diff-opt {
      background: transparent; border: 1px solid rgba(232,121,249,0.3);
      color: #e879f9; padding: 7px 18px; border-radius: 100px;
      font-family: var(--font-mono); font-size: 0.75rem; cursor: pointer;
      transition: all 0.3s ease;
    }
    .diff-opt:hover, .diff-opt.active {
      background: rgba(232,121,249,0.15); border-color: #e879f9;
    }

    .back-btn {
      position: fixed; bottom: 20px; left: 20px; z-index: 300;
      background: rgba(5,7,15,0.85); border: 1px solid rgba(255,255,255,0.1);
      color: #8892a4; padding: 8px 16px; border-radius: 8px;
      font-family: var(--font-mono); font-size: 0.72rem;
      text-decoration: none; transition: all 0.3s ease;
      display: flex; align-items: center; gap: 6px;
    }
    .back-btn:hover { color: #e879f9; border-color: rgba(232,121,249,0.3); }

    /* Mobile up/down */
    .mob-pp {
      position: fixed; right: 16px; top: 50%; transform: translateY(-50%);
      display: none; flex-direction: column; gap: 8px; z-index: 300;
    }
    .mob-pp-btn {
      width: 52px; height: 52px;
      background: rgba(5,7,15,0.85); border: 1px solid rgba(232,121,249,0.3);
      border-radius: 10px; color: #e879f9; font-size: 1.2rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; -webkit-tap-highlight-color: transparent; user-select: none;
    }
    .mob-pp-btn:active { background: rgba(232,121,249,0.15); }
    @media (max-width: 768px) { .mob-pp { display: flex; } }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg" id="mainNav">
  <div class="container">
    <a class="navbar-brand" href="../index.html"><span>&lt;</span>Mirhan Maulana<span class="accent">/&gt;</span></a>
    <div class="d-flex align-items-center gap-3">
      <div class="dark-toggle" id="darkToggle" title="Toggle theme">
        <div class="dark-toggle-thumb"><i class="fa-solid fa-moon"></i></div>
      </div>
    </div>
  </div>
</nav>

<div class="pp-wrap"><canvas id="ppCanvas"></canvas></div>

<div class="mob-pp">
  <button class="mob-pp-btn" id="mobUp"><i class="fa-solid fa-chevron-up"></i></button>
  <button class="mob-pp-btn" id="mobDown"><i class="fa-solid fa-chevron-down"></i></button>
</div>

<div class="game-overlay" id="overlay">
  <div class="ov-emoji">🏓</div>
  <div class="ov-title">Ping Pong</div>
  <div class="ov-sub">Lawan AI! Siapa duluan 7 poin menang.</div>
  <div class="diff-row">
    <button class="diff-opt" data-diff="easy">Easy</button>
    <button class="diff-opt active" data-diff="normal">Normal</button>
    <button class="diff-opt" data-diff="hard">Hard</button>
  </div>
  <button class="ov-btn" id="startBtn"><i class="fa-solid fa-play"></i> Start</button>
  <div class="ov-sub" style="font-size:0.72rem;color:#4a5568">W / S atau ↑ ↓ — Gerakkan paddle</div>
</div>

<a href="../games.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Games</a>

<script>
  const darkToggle = document.getElementById('darkToggle');
  const html = document.documentElement;
  html.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');
  darkToggle.addEventListener('click', () => {
    const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next); localStorage.setItem('theme', next);
  });

  const canvas = document.getElementById('ppCanvas');
  const ctx    = canvas.getContext('2d');

  function resize() {
    canvas.width  = Math.min(window.innerWidth - 40, 640);
    canvas.height = Math.min(window.innerHeight - 90, 420);
  }
  resize();
  window.addEventListener('resize', resize);

  const WIN_SCORE = 7;
  const PADDLE_W  = 12, PADDLE_H = 80;
  const BALL_R    = 8;

  const AI_SPEED = { easy: 2.5, normal: 3.8, hard: 5.2 };
  let diff = 'normal';

  let player, ai, ball, pScore, aScore, running, animId, keys = {};
  let particles = [];

  function init() {
    const W = canvas.width, H = canvas.height;
    player = { x: 16,         y: H/2 - PADDLE_H/2, w: PADDLE_W, h: PADDLE_H, speed: 5 };
    ai     = { x: W-16-PADDLE_W, y: H/2 - PADDLE_H/2, w: PADDLE_W, h: PADDLE_H };
    resetBall();
    pScore = 0; aScore = 0;
    particles = [];
    running = true;
    overlay.classList.add('hidden');
    if (animId) cancelAnimationFrame(animId);
    lastTime = 0;
    requestAnimationFrame(loop);
  }

  function resetBall() {
    const W = canvas.width, H = canvas.height;
    const angle = (Math.random() * 0.6 - 0.3) + (Math.random() > 0.5 ? 0 : Math.PI);
    const spd   = 4.5;
    ball = { x: W/2, y: H/2, vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd, r: BALL_R };
  }

  function spawnParticles(x, y, color) {
    for (let i = 0; i < 10; i++) {
      const a = Math.random() * Math.PI * 2, s = 1 + Math.random() * 3;
      particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, r: 2+Math.random()*3, color, life: 1, decay: 0.05 });
    }
  }

  function update(dt) {
    const W = canvas.width, H = canvas.height;

    // Player
    if (keys['w'] || keys['arrowup'])   player.y -= player.speed;
    if (keys['s'] || keys['arrowdown']) player.y += player.speed;
    player.y = Math.max(0, Math.min(H - PADDLE_H, player.y));

    // AI
    const aiCenter = ai.y + PADDLE_H / 2;
    const aiSpd    = AI_SPEED[diff];
    if (ball.vx > 0) {
      if (aiCenter < ball.y - 8) ai.y += aiSpd;
      else if (aiCenter > ball.y + 8) ai.y -= aiSpd;
    } else {
      // Return to center when ball going away
      if (aiCenter < H/2 - 10) ai.y += aiSpd * 0.5;
      else if (aiCenter > H/2 + 10) ai.y -= aiSpd * 0.5;
    }
    ai.y = Math.max(0, Math.min(H - PADDLE_H, ai.y));

    // Ball
    ball.x += ball.vx;
    ball.y += ball.vy;

    // Top/bottom bounce
    if (ball.y - ball.r <= 0)      { ball.y = ball.r;     ball.vy = Math.abs(ball.vy); }
    if (ball.y + ball.r >= H)      { ball.y = H - ball.r; ball.vy = -Math.abs(ball.vy); }

    // Player paddle hit
    if (ball.vx < 0 &&
        ball.x - ball.r <= player.x + PADDLE_W &&
        ball.x + ball.r >= player.x &&
        ball.y >= player.y && ball.y <= player.y + PADDLE_H) {
      const hit = (ball.y - (player.y + PADDLE_H/2)) / (PADDLE_H/2);
      const spd = Math.hypot(ball.vx, ball.vy) * 1.05;
      const ang = hit * (Math.PI / 3);
      ball.vx = Math.abs(Math.cos(ang) * spd);
      ball.vy = Math.sin(ang) * spd;
      ball.x  = player.x + PADDLE_W + ball.r + 1;
      spawnParticles(ball.x, ball.y, '#e879f9');
    }

    // AI paddle hit
    if (ball.vx > 0 &&
        ball.x + ball.r >= ai.x &&
        ball.x - ball.r <= ai.x + PADDLE_W &&
        ball.y >= ai.y && ball.y <= ai.y + PADDLE_H) {
      const hit = (ball.y - (ai.y + PADDLE_H/2)) / (PADDLE_H/2);
      const spd = Math.hypot(ball.vx, ball.vy) * 1.02;
      const ang = hit * (Math.PI / 3);
      ball.vx = -Math.abs(Math.cos(ang) * spd);
      ball.vy = Math.sin(ang) * spd;
      ball.x  = ai.x - ball.r - 1;
      spawnParticles(ball.x, ball.y, '#a78bfa');
    }

    // Score
    if (ball.x + ball.r < 0) {
      aScore++;
      spawnParticles(W * 0.1, H/2, '#ef4444');
      if (aScore >= WIN_SCORE) { endGame(false); return; }
      resetBall();
    }
    if (ball.x - ball.r > W) {
      pScore++;
      spawnParticles(W * 0.9, H/2, '#22c55e');
      if (pScore >= WIN_SCORE) { endGame(true); return; }
      resetBall();
    }

    // Particles
    particles.forEach(p => { p.x+=p.vx; p.y+=p.vy; p.vx*=0.93; p.vy*=0.93; p.life-=p.decay; });
    particles = particles.filter(p => p.life > 0);
  }

  function draw() {
    const W = canvas.width, H = canvas.height;
    ctx.fillStyle = '#080d1a';
    ctx.fillRect(0, 0, W, H);

    // Center line
    ctx.setLineDash([10, 10]);
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(W/2, 0); ctx.lineTo(W/2, H); ctx.stroke();
    ctx.setLineDash([]);

    // Score
    ctx.font = 'bold 48px "Syne"';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fillText(pScore, W/4, H/2 + 20);
    ctx.fillText(aScore, W*3/4, H/2 + 20);

    // Labels
    ctx.font = '11px "Space Mono"';
    ctx.fillStyle = 'rgba(232,121,249,0.5)';
    ctx.fillText('YOU', W/4, 24);
    ctx.fillStyle = 'rgba(167,139,250,0.5)';
    ctx.fillText('AI', W*3/4, 24);

    // Particles
    particles.forEach(p => {
      ctx.save(); ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    });

    // Paddles
    ctx.save();
    ctx.shadowColor = '#e879f9'; ctx.shadowBlur = 14;
    ctx.fillStyle = '#e879f9';
    roundRect(ctx, player.x, player.y, PADDLE_W, PADDLE_H, 6); ctx.fill();
    ctx.restore();

    ctx.save();
    ctx.shadowColor = '#a78bfa'; ctx.shadowBlur = 14;
    ctx.fillStyle = '#a78bfa';
    roundRect(ctx, ai.x, ai.y, PADDLE_W, PADDLE_H, 6); ctx.fill();
    ctx.restore();

    // Ball
    ctx.save();
    ctx.shadowColor = '#fff'; ctx.shadowBlur = 16;
    const bg = ctx.createRadialGradient(ball.x-2, ball.y-2, 1, ball.x, ball.y, ball.r);
    bg.addColorStop(0, '#fff'); bg.addColorStop(1, '#e879f9');
    ctx.fillStyle = bg;
    ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y);
    ctx.quadraticCurveTo(x+w, y, x+w, y+r);
    ctx.lineTo(x+w, y+h-r);
    ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    ctx.lineTo(x+r, y+h);
    ctx.quadraticCurveTo(x, y+h, x, y+h-r);
    ctx.lineTo(x, y+r);
    ctx.quadraticCurveTo(x, y, x+r, y);
    ctx.closePath();
  }

  function endGame(win) {
    running = false;
    cancelAnimationFrame(animId);
    overlay.classList.remove('hidden');
    overlay.innerHTML = `
      <div class="ov-emoji">${win ? '🏆' : '😢'}</div>
      <div class="ov-title">${win ? 'You Win!' : 'You Lose!'}</div>
      <div class="ov-score">${pScore} — ${aScore}</div>
      <div class="ov-sub">${win ? 'Kamu mengalahkan AI!' : 'AI terlalu tangguh kali ini!'}</div>
      <button class="ov-btn" id="startBtn"><i class="fa-solid fa-rotate-right"></i> Play Again</button>
      <a href="../games.html" style="font-family:var(--font-mono);font-size:0.75rem;color:#4a5568;text-decoration:none;">← Back to Games</a>
    `;
    document.getElementById('startBtn').addEventListener('click', init);
  }

  let lastTime = 0;
  function loop(ts) {
    const dt = Math.min(ts - lastTime, 50); lastTime = ts;
    if (!running) return;
    update(dt); draw();
    animId = requestAnimationFrame(loop);
  }

  document.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; e.preventDefault && ['arrowup','arrowdown'].includes(e.key.toLowerCase()) && e.preventDefault(); });
  document.addEventListener('keyup',   e => { keys[e.key.toLowerCase()] = false; });

  document.getElementById('mobUp').addEventListener('touchstart',   e => { e.preventDefault(); keys['w'] = true; },  { passive: false });
  document.getElementById('mobUp').addEventListener('touchend',     () => { keys['w'] = false; });
  document.getElementById('mobDown').addEventListener('touchstart', e => { e.preventDefault(); keys['s'] = true; },  { passive: false });
  document.getElementById('mobDown').addEventListener('touchend',   () => { keys['s'] = false; });

  document.querySelectorAll('.diff-opt').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.diff-opt').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      diff = btn.dataset.diff;
    });
  });

  document.getElementById('startBtn').addEventListener('click', init);
</script>
</body>
</html>
