<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Platformer Jump — Mirhan Maulana</title>
  <link rel="icon" type="image/png" href="../assets/images/MirhanLog.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/games.css" />
  <style>
    body { background: #05070f; overflow: hidden; }
    #mainNav { position: fixed; }
    .plat-wrap { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; padding-top: 60px; }
    #platCanvas { display: block; border-radius: 12px; border: 1px solid rgba(251,146,60,0.2); max-width: 100%; max-height: calc(100vh - 80px); }
    .hud { position: fixed; top: 68px; left: 0; right: 0; display: flex; justify-content: space-between; padding: 8px 20px; pointer-events: none; z-index: 100; }
    .hud-stat { background: rgba(5,7,15,0.85); border: 1px solid rgba(251,146,60,0.25); border-radius: 8px; padding: 6px 14px; font-family: var(--font-mono); font-size: 0.75rem; color: #fb923c; display: flex; align-items: center; gap: 6px; }
    .hud-stat span { color: #f0f4ff; font-weight: 700; }
    .game-overlay { position: fixed; inset: 0; background: rgba(5,7,15,0.92); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; z-index: 200; -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px); }
    .game-overlay.hidden { display: none; }
    .ov-emoji { font-size: 4rem; line-height: 1; }
    .ov-title { font-family: var(--font-heading); font-size: 2.5rem; font-weight: 800; color: #f0f4ff; }
    .ov-sub { font-family: var(--font-mono); font-size: 0.82rem; color: #8892a4; text-align: center; line-height: 1.7; }
    .ov-score { font-family: var(--font-heading); font-size: 1.1rem; font-weight: 700; color: #fb923c; }
    .ov-btn { background: linear-gradient(135deg,#ea580c,#fb923c); border: none; color: white; padding: 12px 32px; border-radius: 12px; font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; gap: 8px; font-family: var(--font-heading); }
    .ov-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(251,146,60,0.4); }
    .back-btn { position: fixed; bottom: 20px; left: 20px; z-index: 300; background: rgba(5,7,15,0.85); border: 1px solid rgba(255,255,255,0.1); color: #8892a4; padding: 8px 16px; border-radius: 8px; font-family: var(--font-mono); font-size: 0.72rem; text-decoration: none; transition: all 0.3s ease; display: flex; align-items: center; gap: 6px; }
    .back-btn:hover { color: #fb923c; border-color: rgba(251,146,60,0.3); }
    .mob-jump { position: fixed; bottom: 20px; right: 20px; z-index: 300; width: 70px; height: 70px; background: rgba(251,146,60,0.2); border: 2px solid rgba(251,146,60,0.4); border-radius: 50%; color: #fb923c; font-size: 1.5rem; display: none; align-items: center; justify-content: center; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .mob-jump:active { background: rgba(251,146,60,0.4); }
    @media (max-width: 768px) { .mob-jump { display: flex; } }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg" id="mainNav">
  <div class="container">
    <a class="navbar-brand" href="../index.html"><span>&lt;</span>Mirhan Maulana<span class="accent">/&gt;</span></a>
    <div class="d-flex align-items-center gap-3">
      <div class="dark-toggle" id="darkToggle" title="Toggle theme">
        <div class="dark-toggle-thumb"><i class="fa-solid fa-moon"></i></div>
      </div>
    </div>
  </div>
</nav>

<div class="hud">
  <div class="hud-stat">⭐ Score <span id="scoreVal">0</span></div>
  <div class="hud-stat">🏆 Best <span id="bestVal">0</span></div>
</div>

<div class="plat-wrap"><canvas id="platCanvas"></canvas></div>

<button class="mob-jump" id="mobJump">⬆️</button>

<div class="game-overlay" id="overlay">
  <div class="ov-emoji">🦖</div>
  <div class="ov-title">Platformer Jump</div>
  <div class="ov-sub">Lompat hindari obstacle! Makin lama makin cepat.</div>
  <button class="ov-btn" id="startBtn"><i class="fa-solid fa-play"></i> Start</button>
  <div class="ov-sub" style="font-size:0.72rem;color:#4a5568">Space / Up / Tap — Jump</div>
</div>

<a href="../games.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Games</a>

<script>
  const darkToggle = document.getElementById('darkToggle');
  const html = document.documentElement;
  html.setAttribute('data-theme', localStorage.getItem('theme') || 'dark');
  darkToggle.addEventListener('click', () => {
    const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next); localStorage.setItem('theme', next);
  });

  const canvas = document.getElementById('platCanvas');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width  = Math.min(window.innerWidth, 700);
    canvas.height = Math.min(window.innerHeight - 80, 300);
  }
  resize();
  window.addEventListener('resize', resize);

  const GROUND_Y = () => canvas.height - 60;
  const OBSTACLES = ['🌵','🪨','🌲','🏔️'];

  let player, obstacles, clouds, score, speed, running, animId;
  let spawnTimer = 0;
  let best = parseInt(localStorage.getItem('platBest') || '0');
  document.getElementById('bestVal').textContent = best;

  function init() {
    player = {
      x: 80, y: GROUND_Y(),
      w: 40, h: 50,
      vy: 0, onGround: true,
      jumpCount: 0,
    };
    obstacles = [];
    clouds = [
      { x: 100, y: 40, speed: 0.3 },
      { x: 300, y: 70, speed: 0.5 },
      { x: 550, y: 30, speed: 0.4 },
    ];
    score = 0; speed = 5; spawnTimer = 0; running = true;

    overlay.classList.add('hidden');
    if (animId) cancelAnimationFrame(animId);
    lastTime = 0;
    requestAnimationFrame(loop);
  }

  function jump() {
    if (player.jumpCount < 2) {
      player.vy = -14;
      player.onGround = false;
      player.jumpCount++;
    }
  }

  function spawnObstacle() {
    const h = 30 + Math.random() * 30;
    obstacles.push({
      x: canvas.width + 20,
      y: GROUND_Y() + player.h - h,
      w: 30, h,
      emoji: OBSTACLES[Math.floor(Math.random() * OBSTACLES.length)],
    });
  }

  function update(dt) {
    // Player physics
    player.vy += 0.7;
    player.y += player.vy;

    if (player.y >= GROUND_Y()) {
      player.y = GROUND_Y();
      player.vy = 0;
      player.onGround = true;
      player.jumpCount = 0;
    }

    // Clouds
    clouds.forEach(c => {
      c.x -= c.speed;
      if (c.x < -80) c.x = canvas.width + 80;
    });

    // Spawn obstacles
    spawnTimer += dt;
    const interval = Math.max(800, 2000 - score * 1.5);
    if (spawnTimer >= interval) {
      spawnObstacle();
      spawnTimer = 0;
    }

    // Move obstacles
    obstacles.forEach(o => { o.x -= speed; });
    obstacles = obstacles.filter(o => o.x > -50);

    // Score & speed
    score++;
    speed = 5 + Math.floor(score / 300) * 0.5;
    document.getElementById('scoreVal').textContent = score;

    // Collision
    obstacles.forEach(o => {
      if (player.x + player.w - 10 > o.x + 5 &&
          player.x + 10 < o.x + o.w - 5 &&
          player.y + player.h - 5 > o.y + 5) {
        gameOver();
      }
    });
  }

  function draw() {
    const W = canvas.width, H = canvas.height;
    const GY = GROUND_Y();

    // Sky
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, '#0a0e1a');
    sky.addColorStop(1, '#1a2a4a');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);

    // Clouds
    clouds.forEach(c => {
      ctx.font = '32px serif';
      ctx.textAlign = 'center';
      ctx.globalAlpha = 0.4;
      ctx.fillText('☁️', c.x, c.y);
      ctx.globalAlpha = 1;
    });

    // Ground
    ctx.fillStyle = '#1e3a5f';
    ctx.fillRect(0, GY + player.h, W, H - GY - player.h);
    ctx.fillStyle = '#2563eb';
    ctx.fillRect(0, GY + player.h, W, 4);

    // Obstacles
    obstacles.forEach(o => {
      ctx.font = `${o.h}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      ctx.fillText(o.emoji, o.x + o.w / 2, o.y + o.h);
    });

    // Player
    ctx.save();
    ctx.shadowColor = '#fb923c';
    ctx.shadowBlur = 12;
    ctx.font = `${player.h}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText('🦖', player.x + player.w / 2, player.y + player.h);
    ctx.restore();
  }

  function gameOver() {
    running = false;
    cancelAnimationFrame(animId);
    const isNew = score > best;
    if (isNew) { best = score; localStorage.setItem('platBest', best); }
    document.getElementById('bestVal').textContent = best;

    overlay.classList.remove('hidden');
    overlay.innerHTML = `
      <div class="ov-emoji">💥</div>
      <div class="ov-title">Game Over!</div>
      <div class="ov-score">Score: ${score}</div>
      <div class="ov-sub">${isNew ? '🏆 New Best Score!' : `Best: ${best}`}</div>
      <button class="ov-btn" id="startBtn"><i class="fa-solid fa-rotate-right"></i> Play Again</button>
      <a href="../games.html" style="font-family:var(--font-mono);font-size:0.75rem;color:#4a5568;text-decoration:none;">← Back to Games</a>
    `;
    document.getElementById('startBtn').addEventListener('click', init);
  }

  let lastTime = 0;
  function loop(ts) {
    const dt = Math.min(ts - lastTime, 50); lastTime = ts;
    if (!running) return;
    update(dt); draw();
    animId = requestAnimationFrame(loop);
  }

  document.addEventListener('keydown', e => {
    if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w') {
      e.preventDefault();
      if (!running) return;
      jump();
    }
  });

  document.getElementById('mobJump').addEventListener('touchstart', e => {
    e.preventDefault();
    if (running) jump();
  }, { passive: false });

  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    if (running) jump();
  }, { passive: false });

  document.getElementById('startBtn').addEventListener('click', init);
</script>
</body>
</html>
